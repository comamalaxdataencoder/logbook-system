<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logbook System</title>
  <style>
    body { font-family: sans-serif; background: #f4f7f6; padding: 20px; }
    .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 12px; }
    input, select, button { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
    button { background: #007bff; color: white; font-weight: bold; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Logbook System</h2>
    <select id="formSelect">
      <option value="EmployeeLogs">Employee</option>
      <option value="PickupLogs">Pickup</option>
    </select>
    <div id="fields">
        <input id="name" placeholder="Name">
        <input id="contact" placeholder="Contact #">
    </div>
    <button id="submitBtn">SUBMIT</button>
  </div>
  <script src="script.js"></script>
</body>
</html>
