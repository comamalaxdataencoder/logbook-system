<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: sans-serif; background-color: #f4f7f6; padding: 20px; display: flex; justify-content: center; }
    .container { width: 100%; max-width: 500px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    input, select, button { width: 100%; padding: 15px; margin: 8px 0; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
    button { background-color: #007bff; color: white; font-weight: bold; border: none; cursor: pointer; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Logbook System</h2>
    <select id="formSelect" onchange="showForm()">
      <option value="EmployeeLogs">Employee</option>
      <option value="PickupLogs">Pickup</option>
    </select>
    <div id="fields"></div>
    <button onclick="submitForm()">SUBMIT</button>
  </div>

  <script>
    function showForm() {
      let type = document.getElementById('formSelect').value;
      let html = '<input id="name" placeholder="Name" required><input id="contact" placeholder="Contact">';
      document.getElementById('fields').innerHTML = html;
    }

    function submitForm() {
      let data = { 
        formType: document.getElementById('formSelect').value,
        name: document.getElementById('name').value,
        contact: document.getElementById('contact').value
      };
      
      // I-disable ang button para hindi ma-double click
      event.target.disabled = true;
      event.target.innerText = "Sending...";

      // Gagamit tayo ng normal na mode para makita ang error
      fetch("https://script.google.com/macros/s/AKfycbwOPyl0QhLzQR30ARiZZj0HDhICu7iZj5GmlmNIIPYUvjvkG0n0vONcS-E7CqS1852Gjw/exec", {
        method: "POST",
        headers: { "Content-Type": "text/plain" },
        body: JSON.stringify(data)
      })
      .then(response => response.text())
      .then(result => {
        alert("Resulta: " + result);
        event.target.disabled = false;
        event.target.innerText = "SUBMIT";
      })
      .catch(err => {
        alert("Error: " + err);
        event.target.disabled = false;
        event.target.innerText = "SUBMIT";
      });
    }
    
    showForm();
  </script>
</body>
</html>
