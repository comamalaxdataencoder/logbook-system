<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body { font-family: sans-serif; padding: 10px; background: #f4f7f6; margin: 0; display: flex; justify-content: center; }
    .container { width: 100%; max-width: 450px; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    h2 { font-size: 1.2rem; text-align: center; margin-top: 0; }
    select, input, button { width: 100%; padding: 14px; margin: 6px 0; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
    button { background: #007bff; color: white; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
    .radio-group { display: flex; justify-content: space-around; padding: 10px 0; font-size: 1.1rem; }
    #reader { width: 100%; margin-bottom: 10px; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Logbook System</h2>
    <select id="formSelect" onchange="showForm()">
      <option value="EmployeeLogs">Employee</option>
      <option value="VisitorLogs">Visitor</option>
      <option value="PickupLogs">Pickup</option>
      <option value="RTSLogs">RTS</option>
      <option value="DeliveryParcelLogs">Delivery</option>
    </select>
    <div id="fields"></div>
    <div class="radio-group">
      <label><input type="radio" name="action" value="IN" checked> IN</label>
      <label><input type="radio" name="action" value="OUT"> OUT</label>
    </div>
    <button id="submitBtn" onclick="submitForm()">SUBMIT</button>
  </div>

  <script>
    function showForm() {
      let type = document.getElementById('formSelect').value;
      let html = '<input id="name" placeholder="Name" required>' +
                 '<input id="contact" type="text" inputmode="numeric" placeholder="Contact #" oninput="this.value = this.value.replace(/[^0-9]/g, \'\')" required>';
      
      if(type === 'EmployeeLogs' || type === 'VisitorLogs') {
        html += '<input id="dept" placeholder="Department"><select id="whs"><option value="WHS 1103">WHS 1103</option><option value="WHS 1104">WHS 1104</option><option value="OFFICE 1101">OFFICE 1101</option></select><input id="remarks" placeholder="Remarks">';
      } else if(type === 'PickupLogs') {
        html += '<select id="platform"><option>SPX</option><option>Flash Express</option><option>J&T Express</option><option>Ninja Van</option><option>LBC Express</option><option>LEX</option></select>';
      } else if(type === 'RTSLogs') {
        html += '<div id="reader"></div><input id="tracking" placeholder="Tracking Number"><button type="button" onclick="startScanner()">SCAN BARCODE</button>' +
                '<input id="qty" type="text" inputmode="numeric" placeholder="Qty" oninput="this.value = this.value.replace(/[^0-9]/g, \'\')">' +
                '<input id="recBy" placeholder="Received By"><input id="remarks" placeholder="Remarks">';
      } else if(type === 'DeliveryParcelLogs') {
        html += '<input id="dept" placeholder="Department"><input id="forWho" placeholder="Who is this for?">' +
                '<input id="qty" type="text" inputmode="numeric" placeholder="Qty" oninput="this.value = this.value.replace(/[^0-9]/g, \'\')">' +
                '<select id="platform"><option>Lazada</option><option>Tiktok</option><option>Shopee</option><option>Others</option></select>' +
                '<input id="recBy" placeholder="Received By"><input id="checkBy" placeholder="Checked By"><input id="remarks" placeholder="Remarks">';
      }
      document.getElementById('fields').innerHTML = html;
    }

    function startScanner() {
      const html5QrCode = new Html5Qrcode("reader");
      html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 },
        (decodedText) => {
          document.getElementById('tracking').value = decodedText;
          html5QrCode.stop().then(() => { document.getElementById('reader').innerHTML = ""; });
        }
      ).catch(err => { alert("Error sa Camera: " + err); });
    }

    function submitForm() {
      let btn = document.getElementById('submitBtn');
      btn.disabled = true; btn.innerText = "Sending...";
      let data = { formType: document.getElementById('formSelect').value, action: document.querySelector('input[name="action"]:checked').value };
      document.querySelectorAll('#fields input, #fields select').forEach(el => data[el.id] = el.value);

      fetch("https://script.google.com/macros/s/AKfycbwOPyl0QhLzQR30ARiZZj0HDhICu7iZj5GmlmNIIPYUvjvkG0n0vONcS-E7CqS1852Gjw/exec", {
        method: "POST",
        body: JSON.stringify(data)
      })
      .then(r => r.text()).then(t => { alert("Resulta: " + t); btn.disabled = false; btn.innerText = "SUBMIT"; })
      .catch(e => { alert("Error: " + e); btn.disabled = false; btn.innerText = "SUBMIT"; });
    }
    showForm();
  </script>
</body>
</html>
